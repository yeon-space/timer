<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Tablet Timer & Stopwatch</title>
  <!-- Google Fonts: Inter for UI and clean digital look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    <div class="tablet-frame">
      <div class="tablet-screen">
        
        <!-- Header / Status Bar -->
        <header class="status-bar">
          <div class="brand">
            <span class="pulse-dot animate-pulse"></span>
            <span class="brand-text">INTELLIGENT LED TIMER v1.0</span>
          </div>

          <!-- Alarm Sound Selectors 1, 2, 3, 4 (Label changed to 알람음 종류:) -->
          <div class="alarm-sound-selector">
            <span class="selector-label">알람음 종류:</span>
            <div class="selector-buttons">
              <button class="sound-sel-btn active" data-sound="1">1</button>
              <button class="sound-sel-btn" data-sound="2">2</button>
              <button class="sound-sel-btn" data-sound="3">3</button>
              <button class="sound-sel-btn" data-sound="4">4</button>
            </div>
          </div>

          <div class="mode-badge" id="current-mode-badge">STOPWATCH MODE</div>
          <button id="sound-toggle" class="sound-btn" aria-label="음소거 토글">
            <svg class="icon-speaker" viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
        </header>

        <!-- Main Workspace (Vertical Layout) -->
        <main class="dashboard">
          
          <!-- Top Section: Giant Display Console -->
          <section class="top-section">
            <div class="led-container">
              <div class="led-screen">
                <div class="led-glare"></div>
                <div class="led-display">
                  <span id="main-time-min" class="main-digits">00</span>
                  <span class="time-separator">:</span>
                  <span id="main-time-sec" class="main-digits">00</span>
                  <span id="sub-time" class="sub-digits">00</span>
                </div>
              </div>
            </div>
          </section>

          <!-- Bottom Section: Compact Buttons in Two Horizontal Rows -->
          <section class="bottom-section">
            
            <!-- Row 1: Action Controls -->
            <div class="control-row">
              <button id="btn-stopwatch" class="btn btn-blue active">
                <svg viewBox="0 0 24 24" class="btn-icon">
                  <path fill="currentColor" d="M12 20c4.42 0 8-3.58 8-8s-3.58-8-8-8-8 3.58-8 8 3.58 8 8 8zm0-18c5.52 0 10 4.48 10 10s-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2zm1-10h-2v6h2v-6zm-1-4c.55 0 1-.45 1-1V5c0-.55-.45-1-1-1s-1 .45-1 1v1c0 .55.45 1 1 1z"/>
                </svg>
                <span>스탑워치</span>
              </button>
              
              <button id="btn-timer" class="btn btn-blue">
                <svg viewBox="0 0 24 24" class="btn-icon">
                  <path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm3.3 14.88L11 12.4V7h1.5v4.6l3.7 2.2-.7 1.08z"/>
                </svg>
                <span>타이머</span>
              </button>

              <button id="btn-start" class="btn btn-green">
                <svg viewBox="0 0 24 24" class="btn-icon icon-play">
                  <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
                <svg viewBox="0 0 24 24" class="btn-icon icon-pause" style="display:none;">
                  <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
                <span id="start-btn-text">시작</span>
              </button>

              <button id="btn-reset" class="btn btn-dark" aria-label="초기화">
                <svg viewBox="0 0 24 24" class="btn-icon">
                  <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                <span>리셋</span>
              </button>
            </div>

            <!-- Row 2: Preset Time Additions -->
            <div class="preset-row">
              <button class="btn btn-orange" data-seconds="3600">
                <span class="preset-val">1h</span>
                <span class="preset-lbl">1시간</span>
              </button>
              <button class="btn btn-orange" data-seconds="1800">
                <span class="preset-val">30m</span>
                <span class="preset-lbl">30분</span>
              </button>
              <button class="btn btn-orange" data-seconds="600">
                <span class="preset-val">10m</span>
                <span class="preset-lbl">10분</span>
              </button>
              <button class="btn btn-orange" data-seconds="300">
                <span class="preset-val">5m</span>
                <span class="preset-lbl">5분</span>
              </button>
              <button class="btn btn-orange" data-seconds="60">
                <span class="preset-val">1m</span>
                <span class="preset-lbl">1분</span>
              </button>
              <button class="btn btn-orange" data-seconds="30">
                <span class="preset-val">30s</span>
                <span class="preset-lbl">30초</span>
              </button>
              <button class="btn btn-orange" data-seconds="10">
                <span class="preset-val">10s</span>
                <span class="preset-lbl">10초</span>
              </button>
              <button class="btn btn-orange" data-seconds="5">
                <span class="preset-val">5s</span>
                <span class="preset-lbl">5초</span>
              </button>
            </div>

          </section>

        </main>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
